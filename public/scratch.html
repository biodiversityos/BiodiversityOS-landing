<!DOCTYPE html>
<html>
<head>
<style>
  .masked {
    -webkit-mask: url(#mymask);
    mask: url(#mymask);
    width: 300px;
    height: 300px;
    background: red;
  }
</style>
</head>
<body>
  <svg width="0" height="0">
    <defs>
      <mask id="mymask">
        <rect x="0" y="0" width="150" height="150" fill="white" />
        <rect x="150" y="150" width="150" height="150" fill="white" />
      </mask>
    </defs>
  </svg>
  <div style="width: 300px; height: 300px; background: blue; position: absolute; top:0; left:0; z-index:-1;"></div>
  <div class="masked"></div>
</body>
</html>
